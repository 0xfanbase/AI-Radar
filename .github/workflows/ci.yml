name: ci

# Runs the full deterministic test suite (live-network tests excluded by
# pytest.ini's default `-m "not live"`) on every push and pull request --
# the CI gate that must stay green before anything merges.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
