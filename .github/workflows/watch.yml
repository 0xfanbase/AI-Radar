name: watch

# Phase 1 pure-code half of the daily loop (CLAUDE.md's diagram): fetch all
# feeds, cluster & rank, diff vs data/ledger.json, write data/queue.json and
# data/whats_moving.json. No LLM involved -- this workflow only ever runs
# watcher/ code and commits the resulting data/*.json artifacts.
#
# Cron targets CLAUDE.md's documented "daily 07:00 HKT" run exactly: Hong
# Kong is UTC+8 with no DST, so 07:00 HKT = 23:00 UTC the previous day --
# "0 23 * * *" fires once every day at 23:00 UTC, which is 07:00 HKT the
# following day. (Phase 1's original placeholder, "17 6 * * *"/06:17 UTC,
# was an off-hour-minute approximation that never actually matched the
# documented target hour; corrected at the Phase 1 PM checkpoint -- see
# PROGRESS.md.)
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  # Needed for the final "gh workflow run analyze.yml" step below --
  # dispatching a second workflow via the `gh` CLI/API requires the
  # calling token to carry Actions write scope, not just repo contents.
  actions: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persists watcher/http.py's ETag/Last-Modified cache (data/.cache/,
      # gitignored) across scheduled runs so conditional GETs stay cheap.
      # Key always includes the run id so the cache is re-saved every run
      # (an exact key hit would otherwise skip the post-job save); the
      # "watcher-cache-" prefix in restore-keys still finds the most recent
      # previous run's cache to restore from.
      - name: Cache watcher ETag store
        uses: actions/cache@v4
        with:
          path: data/.cache
          key: watcher-cache-${{ github.run_id }}
          restore-keys: |
            watcher-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        run: python -m watcher.cli run

      - name: Commit and push changed data files (bot identity)
        run: |
          git add data/ledger.json data/queue.json data/whats_moving.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git -c user.name="frontier-wire-bot" \
                -c user.email="bot@users.noreply.github.com" \
                commit -m "chore(watch): update ledger/queue/whats_moving [skip ci]"
            git push
          fi

      # Phase 2 hookup: dispatch analyze.yml (the analyst/verifier half of
      # CLAUDE.md's daily loop) once this run's data/*.json is ready, but
      # only if there is actually something queued -- CLAUDE.md's
      # unconditional "empty queue = exit without inventing news" rule
      # applies here too, one step earlier: no point spinning up the
      # analyst/verifier LLM steps (and spending their turn budget) against
      # an empty queue when data/run_plan.json's own run-planner would
      # immediately decide run_mode "skip" anyway. An explicit
      # `gh workflow run` dispatch (not `repository_dispatch`, not a second
      # cron) per the approved plan -- not subject to GITHUB_TOKEN's
      # push-recursion prevention, no new secret needed beyond the
      # actions:write permission above.
      - name: Dispatch analyze.yml if the queue is non-empty
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cluster_count=$(python3 -c "import json; print(len(json.load(open('data/queue.json'))))")
          echo "data/queue.json has $cluster_count cluster(s) this run."
          if [ "$cluster_count" -gt 0 ]; then
            gh workflow run analyze.yml --ref main
          else
            echo "Queue is empty -- not dispatching analyze.yml."
          fi
