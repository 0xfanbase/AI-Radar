name: deploy

# Phase 4: builds the static site (site/generate.py) from content/*.json +
# data/*.json and publishes it to GitHub Pages.
#
# GitHub Pages is live (confirmed 2026-07-21: https://0xfanbase.github.io/
# AI-Radar/ serves this site for real -- the "CANNOT ACTUALLY DEPLOY YET"
# note this comment used to carry was itself stale by then and is
# corrected here rather than left standing; see IMPROVEMENT_BACKLOG.md's
# 2026-07-21 entry).
#
# Trigger, three cases:
# 1. `push` to main touching content/, data/, or site/ -- covers any
#    human- or PAT-authored push (e.g. a reviewed PR merge like this
#    workflow's own history so far).
# 2. `workflow_dispatch` -- manual rebuild.
# 3. `workflow_run` on watch/audit completing -- covers what (1) cannot:
#    watch.yml and audit.yml push using the default GITHUB_TOKEN, and
#    GitHub documents that GITHUB_TOKEN-authored pushes never fire an
#    `on: push` workflow in the same repo (recursion guard), regardless
#    of `[skip ci]` -- confirmed empirically 2026-07-21 too (zero of this
#    workflow's runs, ever, had actor frontier-wire-bot). A same-day
#    2026-07-21 fix mistakenly assumed dropping `[skip ci]` from those two
#    workflows would be sufficient; it was not, and is corrected here with
#    the actual documented workaround (see IMPROVEMENT_BACKLOG.md's
#    correction-of-record entry for the full story) -- no new PAT/secret
#    needed. `workflow_run` has no path-filter equivalent, so this fires
#    on every watch/audit completion, including a "nothing changed"
#    run -- accepted as a minor, free (public-repo Actions minutes) cost
#    rather than added complexity to detect "did it actually push."
#    Gated below to skip if the triggering run didn't succeed.
on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "data/**"
      - "site/**"
  workflow_dispatch: {}
  workflow_run:
    workflows: ["watch", "audit"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Standard GitHub Pages concurrency guard: never run two deploys at once,
# but let an in-flight run finish rather than cancelling it mid-publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Only skip for a workflow_run event whose triggering run didn't
    # succeed (e.g. watch.yml itself failed) -- push/workflow_dispatch
    # events have no workflow_run context, so the left side of this OR is
    # what lets them through unconditionally.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # For a workflow_run trigger, explicitly check out the exact
          # commit that triggering run ended on -- github.sha alone would
          # resolve to main's tip at the moment *this* job starts, which
          # coincidentally is usually the same commit but isn't
          # guaranteed if another push lands in the gap. Falls back to
          # github.sha for push/workflow_dispatch, which have no
          # workflow_run context.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Full history, not the default shallow (depth-1) clone -- this
          # repo's established convention (see watch.yml/ci.yml/
          # analyze.yml): some tests shell out to real `git diff`/`git
          # rev-parse` against a prior commit, which doesn't exist in a
          # depth-1 checkout even though it does in every full-history
          # local sandbox (a real CI failure this repo already hit once;
          # see PROGRESS.md).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # requirements-dev.txt (`-r requirements.txt` plus `pytest`/
      # `requests-mock`) is what actually makes `python -m pytest` runnable
      # at all -- the task's own instructions named only
      # `site/requirements.txt`, but without this the pytest command
      # itself, and every watcher-side test `tests/` collects, would fail
      # to import. Installing both is the minimal correct set. Logged in
      # IMPROVEMENT_BACKLOG.md.
      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt

      - name: Install site generator dependencies
        run: pip install -r site/requirements.txt

      - name: Run tests
        run: python -m pytest

      # site/tests/ is a separate suite from tests/ (pytest.ini's own
      # `testpaths = tests` deliberately doesn't collect it -- see
      # site/tests/test_build.py's own docstring / IMPROVEMENT_BACKLOG.md)
      # but it's exactly the suite that proves the site this job is about
      # to build and publish is accessible and well-formed (one <h1>, one
      # <main id="main-content">, skip-link first, sitemap/robots/404
      # present) -- run it explicitly here too, before the build step,
      # so a real accessibility/build regression blocks deploy the same
      # way a tests/ regression does.
      - name: Run site generator tests
        run: python -m pytest site/tests

      - name: Build the site
        run: python site/generate.py -v

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
